<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Definir senha — ClipSeller</title>
  <link rel="icon" href="/img/IMG_9841.PNG" type="image/png" />
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
  <main class="auth-shell">
    <div class="auth-card">
      <img src="/img/IMG_9841.PNG" alt="ClipSeller" class="auth-logo" />
      <h1>Definir nova senha</h1>
      <p class="auth-sub">Crie uma senha pessoal para acessar o ClipSeller.</p>
      <div id="msg" class="auth-msg"></div>
      <form id="setForm">
        <label>Senha (mín. 6 caracteres)
          <input type="password" name="password" required minlength="6" autocomplete="new-password" />
        </label>
        <label>Confirmar senha
          <input type="password" name="confirm" required minlength="6" autocomplete="new-password" />
        </label>
        <button type="submit">Salvar e entrar</button>
      </form>
      <p class="auth-foot"><a href="/">Voltar ao login</a></p>
    </div>
  </main>
  <script>
  (function () {
    var params = new URLSearchParams(location.search);
    var email = params.get('email') || '';
    var token = params.get('token') || '';
    var msg = document.getElementById('msg');
    var form = document.getElementById('setForm');
    if (!email || !token) {
      msg.textContent = 'Link inválido. Solicite um novo em "Esqueci minha senha".';
      msg.className = 'auth-msg error';
      form.style.display = 'none';
      return;
    }
    form.addEventListener('submit', async function (ev) {
      ev.preventDefault();
      var fd = new FormData(form);
      var p1 = fd.get('password');
      var p2 = fd.get('confirm');
      if (p1 !== p2) { msg.textContent = 'As senhas não conferem.'; msg.className='auth-msg error'; return; }
      msg.textContent = 'Salvando...'; msg.className = 'auth-msg';
      try {
        var r = await fetch('/api/auth/set-password', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email: email, token: token, password: p1 }),
        });
        var data = await r.json();
        if (!r.ok) { msg.textContent = data.error || 'Falha ao salvar.'; msg.className='auth-msg error'; return; }
        localStorage.setItem('cs_token', data.accessToken);
        localStorage.setItem('cs_user', JSON.stringify(data.user));
        location.href = '/';
      } catch (err) {
        msg.textContent = 'Erro de conexão. Tente novamente.'; msg.className='auth-msg error';
      }
    });
  })();
  </script>
</body>
</html>
