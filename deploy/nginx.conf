# /etc/nginx/sites-available/clipseller
# Liga clipseller.com.br (e www) → app Node em 127.0.0.1:4000.
# Antes de habilitar SSL: certbot --nginx -d clipseller.com.br -d www.clipseller.com.br

server {
    listen 80;
    listen [::]:80;
    server_name clipseller.com.br www.clipseller.com.br;

    # ACME challenge para Let's Encrypt (snippet padrão do certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    client_max_body_size 64m;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
